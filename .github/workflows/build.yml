name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]


concurrency:n  group: build-${{ github.ref }}n  cancel-in-progress: truen
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: Build and test
        run: mvn -B verify --no-transfer-progress
